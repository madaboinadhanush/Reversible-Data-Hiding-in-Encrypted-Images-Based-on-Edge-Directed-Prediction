{% extends 'index.html' %}
{% load static %}

{% block hero %}
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
    }

    .login-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
    }
    

    .login-box {
        background-color: white;
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
        color: white;
    }

    .login-box h1 {
        font-size: 2rem;
        text-align: center;
        margin-bottom: 25px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        font-size: 0.9rem;
        display: block;
        margin-bottom: 6px;
        color: #eee;
    }

    .form-group input {
        width: 100%;
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background-color: #2d3e50;
        color: rgb(245, 242, 242);
        font-size: 1rem;
        transition: 0.3s;
    }

    .form-group input:focus {
        outline: none;
        background-color: #3b4f66;
    }

    .forgot-password {
        font-size: 0.8rem;
        text-align: right;
        margin-top: -15px;
        margin-bottom: 15px;
    }

    .forgot-password a {
        color: #00e6c3;
        text-decoration: none;
    }

    .forgot-password a:hover {
        text-decoration: underline;
    }

    .submit-btn {
        width: 100%;
        padding: 12px;
        background-color: #00bfa6;
        color: white;
        font-size: 1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }

    .submit-btn:hover {
        background-color: #009f8b;
    }

    .register-link {
        text-align: center;
        margin-top: 15px;
        font-size: 0.9rem;
    }

    .register-link a {
        color: #00e6c3;
        text-decoration: none;
    }

    .register-link a:hover {
        text-decoration: underline;
    }
</style>

<div class="login-container">
    <form action="/admin_login/" method="post" class="login-box">
{% if messages %}
  <div>
    {% for message in messages %}
      <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}
        <h1>Admin Login</h1>
        {% csrf_token %}

        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Enter Email" required>
        </div>

       
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter Password" required>
        </div>

        <button type="submit" class="submit-btn">Login</button>
    </form>
</div>
{% endblock %}
