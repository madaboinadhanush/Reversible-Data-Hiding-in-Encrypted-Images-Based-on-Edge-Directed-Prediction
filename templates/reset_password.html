{% extends 'index.html' %}
{% load static %}

{% block hero %}
<style>
  body {
    background:linear-gradient(135deg ,#427a37, #7fbff3 ); /* Add this to ensure background behind your form */
    margin: 0;
    min-height: 100vh;
  }
</style>
<div style="max-width:400px; margin: 3rem auto 5rem auto; background-color: rgba(26, 36, 49, 0.9); padding: 2.5rem; border-radius: 1rem; box-shadow: 0 6px 18px rgba(0,0,0,0.7); font-family: Arial, sans-serif; color: #e5e7eb;">

  <h1 style="color: #14b8a6; text-align: center; margin-bottom: 2rem; font-size: 2rem;">Reset Password</h1>

  <div style="text-align: center; margin-bottom: 1.5rem;">
    {% for message in messages %}
      <p style=" font-weight: 600; margin: 0.3rem 0;">
        {{ message }}
      </p>
    {% endfor %}
  </div>

  <form method="post" action="">
    {% csrf_token %}
    
    <label for="otp" style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: #9ca3af;">Enter OTP</label>
    <input
      type="text"
      id="otp"
      name="otp"
      placeholder="Enter the OTP sent to your email"
      required
      style="width: 100%; padding: 0.75rem 1rem; margin-bottom: 1.5rem; border-radius: 0.5rem; border: 1px solid #4b5563; background-color: #374151; color: #f9fafb; font-size: 1rem;"
    />

    <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: #9ca3af;">New Password</label>
    <input
      type="password"
      id="password"
      name="password"
      placeholder="Enter new password"
      required
      style="width: 100%; padding: 0.75rem 1rem; margin-bottom: 1.5rem; border-radius: 0.5rem; border: 1px solid #4b5563; background-color: #374151; color: #f9fafb; font-size: 1rem;"
    />

    <label for="confirm_password" style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: #9ca3af;">Confirm Password</label>
    <input
      type="password"
      id="confirm_password"
      name="confirm_password"
      placeholder="Confirm new password"
      required
      style="width: 100%; padding: 0.75rem 1rem; margin-bottom: 2rem; border-radius: 0.5rem; border: 1px solid #4b5563; background-color: #374151; color: #f9fafb; font-size: 1rem;"
    />

    <button
      type="submit"
      style="width: 100%; background-color: #14b8a6; color: white; border: none; padding: 0.85rem 0; border-radius: 0.75rem; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: background-color 0.3s ease;"
      onmouseover="this.style.backgroundColor='#0d9488';"
      onmouseout="this.style.backgroundColor='#14b8a6';"
    >
      Reset Password
    </button>
  </form>

  <a href="{% url 'user_login' %}" style="display: block; text-align: center; margin-top: 1.5rem; color: #14b8a6; font-weight: 600; text-decoration: none;">
    Back to Login
  </a>
</div>
{% endblock %}
